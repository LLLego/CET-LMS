    <path d="M132 186 L132 334 Q162 325 196 330 L196 180 Q162 175 132 186Z" fill="url(#pages)"/>
    <path d="M384 180 L384 340 Q352 330 312 335 L312 175 Q352 170 384 180Z" fill="url(#book)"/>
    <path d="M380 186 L380 334 Q350 325 316 330 L316 180 Q350 175 380 186Z" fill="url(#pages)"/>
    <path d="M200 175 Q256 195 312 175 L312 335 Q256 355 200 335Z" fill="url(#accent2)" opacity="0.4"/>
    <line x1="256" y1="190" x2="256" y2="348" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <g filter="url(#glow)">
