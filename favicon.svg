    <circle cx="256" cy="126" r="10" fill="url(#accent)"/>
    <polygon points="256,100 320,140 256,180 192,140" fill="url(#accent)" opacity="0.9"/>
    <polygon points="256,100 320,140 256,180 192,140" fill="none" stroke="#fff" stroke-width="1" opacity="0.2"/>
    <polygon points="256,110 296,140 256,170 216,140" fill="#fff" opacity="0.08"/>
  </g>
  <circle cx="380" cy="100" r="3" fill="#4facfe" opacity="0.6"/>
  <circle cx="120" cy="400" r="2.5" fill="#00f2fe" opacity="0.5"/>
  <circle cx="410" cy="380" r="2" fill="#a18cd1" opacity="0.4"/>
  <circle cx="100" cy="130" r="2" fill="#fbc2eb" opacity="0.5"/>
  <text x="256" y="440" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="72" font-weight="800" text-anchor="middle" fill="url(#accent)" letter-spacing="12" filter="url(#glow)">CET</text>
  <text x="256" y="440" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="72" font-weight="800" text-anchor="middle" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.15" letter-spacing="12">CET</text>
  <text x="256" y="478" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="500" text-anchor="middle" fill="#8892b0" letter-spacing="8">LMS</text>
</svg>